name: Deploy PR Docs Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-docs-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Check out gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-deploy

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Build documentation
        run: |
          uv run zensical build --clean

      - name: Fetch base branch for diff
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1

      - name: Find changed doc pages
        id: diff-docs
        run: |
          base="origin/${{ github.event.pull_request.base.ref }}"
          pages=""

          # Markdown files map directly to pages
          md_pages=$(git diff --name-only "$base" -- docs/ \
            | grep '\.md$' \
            | sed 's|^docs/||; s|/index\.md$|/|; s|\.md$|/|')
          pages="${pages}${md_pages}"$'\n'

          # Snippets/notebooks: find which .md files include each changed non-md file
          non_md=$(git diff --name-only "$base" -- docs/snippets/ docs/*.ipynb || true)
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            # Search for markdown files that reference this snippet path
            includers=$(grep -Frl "$f" docs/ --include='*.md' 2>/dev/null \
              | sed 's|^docs/||; s|/index\.md$|/|; s|\.md$|/|' || true)
            pages="${pages}${includers}"$'\n'
          done <<< "$non_md"

          pages=$(echo "$pages" | grep -v '^$' | sort -u)
          {
            echo "pages<<EOF"
            echo "$pages"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy preview to gh-pages
        run: |
          rm -rf "gh-pages-deploy/pr-preview/pr-${{ github.event.number }}"
          mkdir -p "gh-pages-deploy/pr-preview/pr-${{ github.event.number }}"
          cp -r site/. "gh-pages-deploy/pr-preview/pr-${{ github.event.number }}/"
          printf 'mcp.idfkit.com\n' > gh-pages-deploy/CNAME

          cd gh-pages-deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || {
            git commit -m "Deploy docs preview for PR #${{ github.event.number }}"
            git pull --rebase origin gh-pages
            git push origin gh-pages
          }

      - name: Add or update preview comment
        uses: actions/github-script@v7
        env:
          CHANGED_PAGES: ${{ steps.diff-docs.outputs.pages }}
        with:
          script: |
            const previewUrl = `https://mcp.idfkit.com/pr-preview/pr-${context.issue.number}/`;
            const marker = '<!-- docs-preview-comment -->';

            const changedPages = (process.env.CHANGED_PAGES || '').trim();
            let changedSection = '';
            if (changedPages) {
              const links = changedPages.split('\n').map(p => `- ${previewUrl}${p}`).join('\n');
              changedSection = `\n\n**Changed pages:**\n${links}`;
            }

            const body = [
              marker,
              `**Docs preview** for this PR is available at:`,
              previewUrl,
              changedSection,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Check out gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          if [ -d "pr-preview/pr-${{ github.event.number }}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "pr-preview/pr-${{ github.event.number }}"
            git commit -m "Remove docs preview for PR #${{ github.event.number }}"
            git pull --rebase origin gh-pages
            git push
          fi
