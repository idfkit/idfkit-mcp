name: deploy-docs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Build documentation
        run: uv run zensical build --clean

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy-staging/docs
          cp gh-pages-extra/index.html deploy-staging/
          cp -r site/. deploy-staging/docs/

      - name: Preserve PR previews from gh-pages
        run: |
          git fetch origin gh-pages:gh-pages || true
          if git show gh-pages:pr-preview >/dev/null 2>&1; then
            git worktree add --detach gh-pages-ref gh-pages
            cp -r gh-pages-ref/pr-preview deploy-staging/pr-preview
            git worktree remove gh-pages-ref
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy-staging
          force_orphan: true
          cname: mcp.idfkit.com
